<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Web Invitation Creator</title>
    <link rel="stylesheet" href="/client/assets/css/base.css" />
    <link rel="stylesheet" href="/client/assets/css/auth.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card">
        <p class="auth-kicker">Join Us</p>
        <h1>Create Account</h1>
        <p class="auth-subtitle">Start building beautiful invitation pages.</p>

        <form class="auth-form" action="#" method="post">
          <label for="name">Full Name</label>
          <input
            id="name"
            name="name"
            type="text"
            placeholder="Your full name"
            required
          />

          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Minimum 6 characters"
            minlength="6"
            required
          />

          <button class="btn btn-primary" type="submit">Register</button>
        </form>

        <p class="auth-footer">
          Already have an account?
          <a href="/client/pages/auth/login.html">Log in</a>
        </p>
        <p class="auth-footer"><a href="/client/index.html">Back to Home</a></p>
      </section>
    </main>
    <script type="module" src="/client/assets/js/register.js"></script>
  </body>
</html>
