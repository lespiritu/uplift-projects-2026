<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Web Invitation Creator</title>
    <link rel="stylesheet" href="/client/assets/css/base.css" />
    <link rel="stylesheet" href="/client/assets/css/auth.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card">
        <p class="auth-kicker">Welcome Back</p>
        <h1>Log In</h1>
        <p class="auth-subtitle">
          Access your dashboard and manage your events.
        </p>

        <form class="auth-form" action="#" method="post">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter your password"
            required
          />

          <button id="login-btn" class="btn btn-primary" type="submit">
            Log In
          </button>
        </form>

        <p class="auth-footer">
          No account yet?
          <a href="/client/pages/auth/register.html">Create one</a>
        </p>
        <p class="auth-footer"><a href="/client/index.html">Back to Home</a></p>
      </section>
    </main>

    <script src="/client/assets/js/login.js"></script>
  </body>
</html>
